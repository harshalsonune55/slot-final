services:
  backend:
    build:
      context: ./Backend
    image: slot-backend:latest
    restart: unless-stopped
    env_file:
      - ./Backend/.env
    ports:
      - "127.0.0.1:3001:3001"
    volumes:
      - backend_uploads:/app/uploads

  bot:
    build:
      context: ./Bot
    image: slot-bot:latest
    restart: unless-stopped
    env_file:
      - ./Bot/.env
    depends_on:
      - backend

  frontend:
    build:
      context: ./Frontend
      args:
        VITE_BACKEND_URL: ${VITE_BACKEND_URL}
        VITE_RAZORPAY_KEY_ID: ${VITE_RAZORPAY_KEY_ID}
    image: slot-frontend:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:8081:80"
    depends_on:
      - backend

volumes:
  backend_uploads:
